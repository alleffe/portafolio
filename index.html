<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Quem está assistindo?</h1>
        <p>Escolha o perfil para continuar</p>

    <section class="profiles" aria-label="Seleção de perfis">

                <img src="/assets/perfil-1.png" alt="Avatar do Perfil 1">

            </figure>
        </article>

        <article class="profile" aria-label="Perfil 2">
            <figure>
                <img src="/assets/perfil-4.jpg" alt="Avatar do Perfil 2">
                <figcaption>Giovanna</figcaption>
            </figure>
        </article>
                    <article class="profile" aria-label="Perfil 3">
            <figure>
                <img src="/assets/perfil-2.png" alt="Avatar do Perfil 3">
                <figcaption>Guilherme</figcaption>
            </figure>
        </article>
            <article class="profile" aria-label="Perfil 4">
                <figure>
                    <img src="/assets/perfil-3.jpg" alt="Avatar do Perfil 4">
                    <figcaption>Bryan</figcaption>
                </figure>
            </article>
        
    </section>
</body>
</html>
